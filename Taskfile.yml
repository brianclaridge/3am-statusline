version: "3"

dotenv: [".env"]

tasks:
  default:
    cmds:
      - cmd: task --list-all
    silent: true

  clear:
    cmds:
      - cmd: clear
        platforms: [linux, darwin]
      - cmd: 'pwsh -NoProfile -Command "try { [Console]::Clear() } catch { }; exit 0"'
        platforms: [windows]
    silent: true

  update:
    desc: Update Claude CLI
    cmds:
      - claude update
      - claude --version
    silent: true

  claude:
    desc: Run Claude with specific flags
    deps:
      - update
    env:
      COLORTERM: "truecolor"
      CLAUDE_CONFIG_DIR: ".data/claude-data"
      CLAUDE_CODE_TMPDIR: ".data/claude-tmp"
      STATUSLINE_CONFIG: "config/statusline.yml"
    vars:
      ARGS: --chrome --ide --model opus
    cmds:
      - claude {{.ARGS}} --continue 2>/dev/null || claude {{.ARGS}}
    silent: true
    interactive: true

  build:
    desc: Build for all platforms (release)
    vars:
      VERSION:
        sh: 'echo "$(date -u +%Y.%m.%d)-$(git rev-parse --short HEAD)"'
      TARGETS: x86_64-unknown-linux-musl aarch64-unknown-linux-gnu x86_64-pc-windows-gnu
    cmds:
      - for: { var: TARGETS }
        cmd: BUILD_VERSION={{.VERSION}} cargo build --release --target {{.ITEM}}
      - BUILD_VERSION={{.VERSION}} cargo build --release
      - mkdir -p bin/release
      - cp bin/target/release/3am-statusline bin/release/3am-statusline
      - cp bin/target/x86_64-unknown-linux-musl/release/3am-statusline bin/release/3am-statusline-linux-x64
      - cp bin/target/aarch64-unknown-linux-gnu/release/3am-statusline bin/release/3am-statusline-linux-arm64
      - cp bin/target/x86_64-pc-windows-gnu/release/3am-statusline.exe bin/release/3am-statusline-win-x64.exe
    silent: true

  test:
    desc: Run unit tests
    cmds:
      - cargo test
    silent: true

  time:
    desc: Show world clocks
    cmds:
      - ./bin/target/debug/3am-statusline event time
    silent: true

  status:
    desc: Check Claude API status
    cmds:
      - ./bin/target/debug/3am-statusline event status
    silent: true

  release:
    desc: Tag and push to trigger the GitHub Actions release pipeline
    vars:
      TAG:
        sh: 'date -u +%Y.%m.%d-$(git rev-parse --short HEAD)'
    preconditions:
      - sh: git diff --quiet && git diff --cached --quiet
        msg: "Working tree is dirty — commit or stash changes first"
      - sh: command -v gh
        msg: "gh CLI is required — install from https://cli.github.com"
    cmds:
      - git tag {{.TAG}}
      - git push origin {{.TAG}}
      - echo "Tag {{.TAG}} pushed — watching pipeline..."
      - gh run watch $(gh run list --workflow=release.yml --limit=1 --json=databaseId --jq='.[0].databaseId') --exit-status
    silent: true
