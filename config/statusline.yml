# Example 3am-statusline config
# Copy to .claude/statusline.yml in your project root

state:
  dir: ".data/statusline"

logging:
  file: ".data/statusline/statusline.log"
  json:
    dir: ".data/statusline/json"
    keep: 15

lines:
  - left: ""
  - left: ""
  - left: ""
  - left: "{c:model}Claude{/c} {c:model_name}{model.display_name}{/c} {c:sep}|{/c} {c:dim}v{version}{/c} {c:sep}|{/c} {event.claude}"
    right: "{c:green}+{cost.total_lines_added|comma}{/c} {c:red}-{cost.total_lines_removed|comma}{/c} lines [{cost.total_cost_usd|currency|cost}]"
  - left: "{meter:context_window.used_percentage} {c:green}{ctx_pct_green}{/c}{c:1;33}{ctx_pct_yellow}{/c}{c:1;31}{ctx_pct_red}{/c} ctx"
    right: "{context_window.total_input_tokens|tokens|value} tok {c:sep}|{/c} {context_window.total_output_tokens|tokens|value} out"
  - left: "{meter:ratelimit.5h} {c:green}{rl_5h_green}{/c}{c:1;33}{rl_5h_yellow}{/c}{c:1;31}{rl_5h_red}{/c} session"
    right: "{c:dim}resets{/c} {ratelimit.5h_eta|dim}"
  - left: "{meter:ratelimit.7d} {c:green}{rl_7d_green}{/c}{c:1;33}{rl_7d_yellow}{/c}{c:1;31}{rl_7d_red}{/c} weekly"
    right: "{c:dim}resets{/c} {ratelimit.7d_eta|dim}"
  - left: ""
  - left: "{c:dim}plan:{/c} {c:plan}{plan.slug}{/c}"
    right: "{c:dim}session:{/c} {c:session}{session_id}{/c}"
  - left: "{c:dim}cwd:{/c} {cwd}"
    right: "{c:dim}cpu:{/c} {c:cpu}{event.sys.cpu}{/c} {c:sep}|{/c} {c:dim}mem:{/c} {c:mem}({event.sys.mem_pct}, {event.sys.mem_used}/{event.sys.mem_total}){/c}"
  - left: "{c:dim}git:{/c} 🌿 {c:branch}{event.git.branch}{/c} {c:dim}{event.git.sha}{/c} {c:sync}{event.git.sync}{/c} {c:dirty}{event.git.dirty}{/c}"
  - left: "{c:dim}pst:{/c} {c:clock}{event.time.pst}{/c} {event.time.pst_icon} {c:sep}|{/c} {c:dim}mst:{/c} {c:clock}{event.time.mst}{/c} {event.time.mst_icon} {c:sep}|{/c} {c:dim}cst:{/c} {c:clock}{event.time.cst}{/c} {event.time.cst_icon} {c:sep}|{/c} {c:dim}est:{/c} {c:clock}{event.time.est}{/c} {event.time.est_icon}"
  - left: "{c:dim}{event.weather.zip}:{/c} {c:cold}{event.weather.temp_cold}{/c}{c:warm}{event.weather.temp_warm}{/c}{c:hot}{event.weather.temp_hot}{/c} {c:dim}[{event.weather.condition}]{/c} {event.weather.emoji}"
  - left: ""

theme:
  model: "1"        # bold
  model_name: "1;36" # bold cyan
  cost: "32"        # green
  value: "36"       # cyan
  session: "34"     # blue
  plan: "33"        # yellow
  dim: "2"          # dim
  clock: "35"       # magenta
  cpu: "33"         # yellow
  mem: "35"         # magenta
  api: "36"         # cyan
  sep: "2"          # dim
  branch: "92"      # bright green
  sync: "36"        # cyan
  dirty: "33"       # yellow
  cold: "34"        # blue
  warm: "33"        # yellow
  hot: "31"         # red

meter:
  width: 10
  filled: "●"
  empty: "○"
  thresholds:
    green: 0
    yellow: 60
    red: 85

color_fields:
  - name: ctx_pct
    source: "context_window.used_percentage"
    format: "pct"
    yellow: 40
    red: 60
  - name: rl_5h
    source: "ratelimit.5h"
    format: "pct"
    yellow: 40
    red: 60
  - name: rl_7d
    source: "ratelimit.7d"
    format: "pct"
    yellow: 40
    red: 60

events:
  - name: claude
    command: "${CLAUDE_PLUGIN_ROOT}/bin/release/3am-statusline event status"
    interval: 30s
    capture: true
  - name: sys
    command: "${CLAUDE_PLUGIN_ROOT}/bin/release/3am-statusline event sys"
    interval: 1800ms
    capture: true
  - name: time
    command: "${CLAUDE_PLUGIN_ROOT}/bin/release/3am-statusline event time"
    interval: 3s
    capture: true
  - name: git
    command: "${CLAUDE_PLUGIN_ROOT}/bin/release/3am-statusline event git"
    interval: 8s
    capture: true
  - name: weather
    command: "${CLAUDE_PLUGIN_ROOT}/bin/release/3am-statusline event weather --zip 98221"
    interval: 15m
    capture: true
