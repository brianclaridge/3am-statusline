# Example 3am-statusline config
# Copy to .claude/statusline.yml in your project root

state:
  dir: ".data/statusline"

logging:
  file: ".data/statusline/statusline.log"
  json:
    dir: ".data/statusline/json"
    keep: 15

lines:
  - left: ""
  - left: ""
  - left: "{c:dim}cwd:{/c} {cwd}"
  - left: "{c:dim}session:{/c} {c:session}{session_id}{/c}"
    right: "{c:plan}{plan.slug}{/c}"
  - left: "{c:model}Claude {model.display_name}{/c} {c:sep}|{/c} {c:dim}v{version}{/c} {c:sep}|{/c} {event.claude}"
    right: "{c:green}+{cost.total_lines_added|comma}{/c} {c:red}-{cost.total_lines_removed|comma}{/c} lines [{cost.total_cost_usd|currency|cost}]"
  - left: "{meter:context_window.used_percentage} {context_window.used_percentage|pct|value} ctx"
    right: "{context_window.total_input_tokens|tokens|value} tok {c:sep}|{/c} {context_window.total_output_tokens|tokens|value} out"
  - left: "{meter:ratelimit.5h} {ratelimit.5h|pct|value} session"
    right: "{c:dim}resets{/c} {ratelimit.5h_eta|dim}"
  - left: "{meter:ratelimit.7d} {ratelimit.7d|pct|value} weekly"
    right: "{c:dim}resets{/c} {ratelimit.7d_eta|dim}"
  - left: "{c:dim}pst{/c} {c:clock}{event.time.pst}{/c} {c:sep}|{/c} {c:dim}mst{/c} {c:clock}{event.time.mst}{/c} {c:sep}|{/c} {c:dim}cst{/c} {c:clock}{event.time.cst}{/c} {c:sep}|{/c} {c:dim}est{/c} {c:clock}{event.time.est}{/c}"
    right: "{c:dim}cpu:{/c} {c:cpu}{event.sys.cpu}{/c} {c:sep}|{/c} {c:dim}mem:{/c} {c:mem}({event.sys.mem_pct}, {event.sys.mem_used}/{event.sys.mem_total}){/c}"
  - left: "🌿 {c:branch}{event.git.branch}{/c} {c:dim}{event.git.sha}{/c} {c:sync}{event.git.sync}{/c} {c:sep}|{/c} {c:dirty}{event.git.dirty}{/c}"
  - left: ""

theme:
  model: "1"        # bold
  cost: "32"        # green
  value: "36"       # cyan
  session: "34"     # blue
  plan: "33"        # yellow
  dim: "2"          # dim
  clock: "35"       # magenta
  cpu: "33"         # yellow
  mem: "35"         # magenta
  api: "36"         # cyan
  sep: "2"          # dim
  branch: "92"      # bright green
  sync: "36"        # cyan
  dirty: "33"       # yellow

meter:
  width: 10
  filled: "●"
  empty: "○"
  thresholds:
    green: 0
    yellow: 60
    red: 85

events:
  - name: claude
    command: "${CLAUDE_PLUGIN_ROOT}/bin/release/3am-statusline event status"
    interval: 30s
    capture: true
  - name: sys
    command: "${CLAUDE_PLUGIN_ROOT}/bin/release/3am-statusline event sys"
    interval: 1800ms
    capture: true
  - name: time
    command: "${CLAUDE_PLUGIN_ROOT}/bin/release/3am-statusline event time"
    interval: 5s
    capture: true
  - name: git
    command: "${CLAUDE_PLUGIN_ROOT}/bin/release/3am-statusline event git"
    interval: 5s
    capture: true
