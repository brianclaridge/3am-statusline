# Example 3am-statusline config
# Copy to .claude/statusline.yml in your project root

logging:
  dir: ".data/logs/statusline"
  keep: 15

lines:
  - left: ""
  - left: ""
  - left: "{c:dim}cwd:{/c} {cwd}"
  - left: "{c:dim}session:{/c} {c:session}{session_id}{/c}"
    right: "{c:plan}{plan.slug}{/c}"
  - left: "{c:model}{model.display_name}{/c} {c:dim}v{version}{/c}"
    right: "{cost.total_cost_usd|currency|cost}"
  - left: "{meter:context_window.used_percentage} {context_window.used_percentage|pct|value} ctx"
    right: "{context_window.total_input_tokens|tokens|value} tok"
  - left: "{meter:ratelimit.5h} {ratelimit.5h|pct|value} session"
    right: "{c:dim}resets{/c} {ratelimit.5h_eta|dim}"
  - left: "{meter:ratelimit.7d} {ratelimit.7d|pct|value} weekly"
    right: "{c:dim}resets{/c} {ratelimit.7d_eta|dim}"
  - left: "{context_window.total_output_tokens|tokens|value} out"
    right: "{c:green}+{cost.total_lines_added|comma}{/c} {c:red}-{cost.total_lines_removed|comma}{/c} lines"
  - left: "{c:dim}pst{/c} {c:clock}{event.pst}{/c} {c:sep}|{/c} {c:dim}mst{/c} {c:clock}{event.mst}{/c} {c:sep}|{/c} {c:dim}cst{/c} {c:clock}{event.cst}{/c} {c:sep}|{/c} {c:dim}est{/c} {c:clock}{event.est}{/c}"
    right: "{c:cpu}cpu {event.cpu}{/c} {c:sep}|{/c} {event.claude}"
  - left: ""

theme:
  model: "1"        # bold
  cost: "32"        # green
  value: "36"       # cyan
  session: "34"     # blue
  plan: "33"        # yellow
  dim: "2"          # dim
  clock: "35"       # magenta
  cpu: "33"         # yellow
  api: "36"         # cyan
  sep: "2"          # dim

meter:
  width: 10
  filled: "●"
  empty: "○"
  thresholds:
    green: 0
    yellow: 60
    red: 85

events:
  - name: claude
    command: "uv run scripts/status.py"
    interval: 30s
    capture: true
  - name: cpu
    command: "top -bn1 | awk '/^%Cpu/{printf \"%.0f%%\", 100-$8}'"
    interval: 3s
    capture: true
  - name: pst
    command: "uv run scripts/time.py PST"
    interval: 5s
    capture: true
  - name: mst
    command: "uv run scripts/time.py MST"
    interval: 5s
    capture: true
  - name: cst
    command: "uv run scripts/time.py CST"
    interval: 5s
    capture: true
  - name: est
    command: "uv run scripts/time.py EST"
    interval: 5s
    capture: true

# budget:
#   weekly_tokens: 5_000_000
#   monthly_tokens: 20_000_000
